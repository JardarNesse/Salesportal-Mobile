    html {

    :root {
      --bg: #0b0f14;
      --card: #111827;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.6);
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 1.25rem 1rem;
      background: radial-gradient(circle at top, #111827, var(--bg));
      color: var(--text);
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 26.25rem;
      padding: 1.5rem 1.25rem;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1.25rem;
      box-shadow: 0 0 2.5rem rgba(0,0,0,0.6);
      backdrop-filter: blur(0.5rem);
    }

    h1 {
      margin: 0 0 0.5rem 0;
      font-size: 1.375rem;   /* 22px */
      font-weight: 600;
      text-align: center;
    }

    p {
      margin: 0 0 1.5rem 0;
      font-size: 0.8125rem;  /* 13px */
      text-align: center;
      color: var(--muted);
    }

    .link {
      display: block;
      padding: 1rem 1.25rem;
      margin-bottom: 0.875rem;
      border-radius: 0.875rem;
      text-decoration: none;
      color: var(--text);
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .link::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, var(--accent-glow), transparent);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .link:hover {
      transform: translateY(-0.125rem);
      border-color: var(--accent);
      box-shadow: 0 0 1.5rem rgba(56, 189, 248, 0.25);
    }

    .link:hover::before {
      opacity: 0.35;
    }

    .title {
      font-size: 1.125rem;  /* 18px */
      font-weight: 500;
    }

    .subtitle {
      font-size: 0.9375rem;  /* 15px */
      color: var(--muted);
      margin-top: 0.25rem;
    }

    footer {
      margin-top: 1.375rem;
      font-size: 0.6875rem;
      text-align: center;
      color: #6b7280;
    }
  </style>
